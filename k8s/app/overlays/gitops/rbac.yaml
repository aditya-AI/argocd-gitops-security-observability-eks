apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-readonly
  namespace: gitops-demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: app-readonly
  namespace: gitops-demo
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "endpoints", "events", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: app-readonly
  namespace: gitops-demo
subjects:
  - kind: ServiceAccount
    name: app-readonly
    namespace: gitops-demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: app-readonly
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-operator
  namespace: gitops-demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: app-operator
  namespace: gitops-demo
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "configmaps", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale", "statefulsets", "statefulsets/scale"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "patch", "update", "create", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: app-operator
  namespace: gitops-demo
subjects:
  - kind: ServiceAccount
    name: app-operator
    namespace: gitops-demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: app-operator
