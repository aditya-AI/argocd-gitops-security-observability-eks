apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: gitops-demo
spec:
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 4Gi
        storageClassName: gitops-demo-gp3
