apiVersion: batch/v1
kind: Job
metadata:
  name: migrate
  namespace: gitops-demo
  labels:
    app: migrator
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: migrator
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "waiting for postgres...";
              until pg_isready -h postgres -p 5432; do
                sleep 2;
              done
      containers:
        - name: migrator
          image: gitops-demo-migrator:local
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
